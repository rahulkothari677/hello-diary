<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
    <defs>
        <!-- Background Gradient -->
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#1A1B2F" />
            <stop offset="50%" stop-color="#16152B" />
            <stop offset="100%" stop-color="#0B0A16" />
        </linearGradient>
        
        <!-- Book Cover Gradient -->
        <linearGradient id="bookGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#6B7FD7" />
            <stop offset="100%" stop-color="#4E5CA1" />
        </linearGradient>
        
        <!-- Gold Glow Gradient -->
        <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FFE6A7" />
            <stop offset="100%" stop-color="#D4AF37" />
        </linearGradient>
        
        <!-- Moon Glow Filter -->
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="15" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>
    
    <!-- Outer Icon Shape -->
    <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />
    
    <!-- Glowing Orbs (Atmospheric background) -->
    <circle cx="150" cy="150" r="100" fill="#6B7FD7" opacity="0.15" filter="url(#glow)" />
    <circle cx="360" cy="360" r="120" fill="#A887EB" opacity="0.12" filter="url(#glow)" />
    
    <!-- Decorative border ring -->
    <rect x="24" y="24" width="464" height="464" rx="88" fill="none" stroke="rgba(255, 255, 255, 0.05)" stroke-width="6" />

    <!-- Group: Diary Book & Moon -->
    <g transform="translate(20, 10)">
        <!-- Book Shadow -->
        <path d="M 130 190 L 320 230 C 335 233, 345 248, 342 263 L 292 413 C 289 428, 274 438, 259 435 L 70 395 C 55 392, 45 377, 48 362 L 98 212 C 101 197, 116 187, 131 190 Z" fill="rgba(0,0,0,0.4)" filter="url(#glow)" />
        
        <!-- Book Spine/Back Cover -->
        <path d="M 125 195 L 140 198 L 90 398 L 75 395 Z" fill="#3D4A85" />

        <!-- Book Cover -->
        <path d="M 135 192 L 320 230 C 332 232, 340 243, 338 255 L 292 405 C 290 417, 279 425, 267 423 L 82 385 C 70 383, 62 372, 64 360 L 110 210 C 112 198, 123 190, 135 192 Z" fill="url(#bookGrad)" stroke="rgba(255,255,255,0.1)" stroke-width="2" />
        
        <!-- Book Page Edges (Tilted pages lines) -->
        <path d="M 320 230 L 326 232 M 292 405 L 298 407 L 278 412" stroke="#E6E3DE" stroke-width="4" stroke-linecap="round" />
        
        <!-- Gold Book Embossing / Lock Strap -->
        <path d="M 230 310 C 220 308, 205 315, 200 325 L 180 385" stroke="url(#goldGrad)" stroke-width="8" stroke-linecap="round" fill="none" />
        <circle cx="202" cy="323" r="12" fill="url(#goldGrad)" />
        <circle cx="202" cy="323" r="5" fill="#16152B" />
        
        <!-- Star Motif on Book Cover -->
        <path d="M 195 240 L 197 248 L 205 250 L 197 252 L 195 260 L 193 252 L 185 250 L 193 248 Z" fill="url(#goldGrad)" />

        <!-- Glowing Crescent Moon -->
        <path d="M 330 110 C 375 110, 410 145, 410 190 C 410 227, 385 259, 350 268 C 375 258, 392 232, 392 202 C 392 162, 360 130, 320 130 C 310 130, 301 132, 292 136 C 302 120, 315 110, 330 110 Z" fill="url(#goldGrad)" filter="url(#glow)" />
        
        <!-- Twinkling Sparkles in the Sky -->
        <!-- Sparkle 1 -->
        <g transform="translate(140, 100)">
            <path d="M 0 -15 L 2 -4 L 13 0 L 2 4 L 0 15 L -2 4 L -13 0 L -2 -4 Z" fill="#FFE6A7" opacity="0.9" />
        </g>
        <!-- Sparkle 2 -->
        <g transform="translate(380, 320)">
            <path d="M 0 -10 L 2 -3 L 9 0 L 2 3 L 0 10 L -2 3 L -9 0 L -2 -3 Z" fill="#FFE6A7" opacity="0.8" />
        </g>
        <!-- Sparkle 3 -->
        <g transform="translate(280, 70)">
            <path d="M 0 -8 L 1 -2 L 7 0 L 1 2 L 0 8 L -1 2 L -7 0 L -1 -2 Z" fill="#FFE6A7" opacity="0.75" />
        </g>
    </g>
</svg>
